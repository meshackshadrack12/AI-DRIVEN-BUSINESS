<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Smart Ranch</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-brand">
      <span>Smart Ranch</span>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#services">Services</a></li>
      <li><a href="contact.html" style="color: var(--primary-blue); font-weight: 700;">Contact</a></li>
    </ul>
  </nav>

  <section>
    <div class="contact-container">
      <h2 class="section-title" style="margin-bottom: 1rem;">Get in Touch</h2>
      <p style="text-align: center; color: var(--text-secondary); margin-bottom: 3rem;">Have questions about our AI models, enterprise pricing, or need technical support? We're here to help.</p>
      
      <form id="contactForm" onsubmit="event.preventDefault(); alert('Message sent successfully! Our team will contact you shortly.'); this.reset();">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
          <div class="form-group" style="margin-bottom: 0;">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" class="form-control" required>
          </div>
          <div class="form-group" style="margin-bottom: 0;">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" class="form-control" required>
          </div>
        </div>
        
        <div class="form-group">
          <label for="contactEmail">Email Address</label>
          <input type="email" id="contactEmail" class="form-control" required>
        </div>

        <div class="form-group">
          <label for="subject">Subject</label>
          <select id="subject" class="form-control" required>
            <option value="">Select a topic...</option>
            <option value="sales">Sales & Pricing</option>
            <option value="support">Technical Support</option>
            <option value="partnership">Partnership Inquiry</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" class="form-control" rows="5" required></textarea>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 1rem;">Send Message</button>
      </form>
    </div>
  </section>

</body>
</html>
